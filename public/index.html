<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentry — Live Demo</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #6C5FC7;
      --accent-dim: #2a2440;
      --danger: #f85149;
      --danger-dim: #3d1c1c;
      --green: #3fb950;
      --yellow: #e3b341;
      --blue: #58a6ff;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 52px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo { font-weight: 700; font-size: 0.95rem; display: flex; align-items: center; gap: 0.5rem; }
    .logo-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); }

    .nav-controls { display: flex; align-items: center; gap: 0.75rem; }
    .counter { font-size: 0.82rem; color: var(--muted); min-width: 44px; text-align: center; }

    .lang-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.2rem 0.65rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      transition: background 0.15s, color 0.15s;
    }
    .lang-btn:hover { background: var(--border); color: var(--text); }
    .lang-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    .nav-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      width: 30px; height: 30px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .nav-btn:hover:not(:disabled) { background: var(--border); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    /* ── Progress bar ── */
    .progress { height: 3px; background: var(--border); flex-shrink: 0; }
    .progress-fill { height: 100%; background: var(--accent); transition: width 0.35s ease; }

    /* ── Slide area ── */
    .slide-area { flex: 1; overflow: hidden; }

    .slide {
      height: 100%;
      padding: 2.5rem 3rem;
      display: flex;
      flex-direction: column;
    }

    /* Intro/outro: centered */
    .slide.centered {
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 1.5rem;
    }

    /* Regular slide: two columns */
    .slide-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      flex: 1;
      min-height: 0;
    }

    .slide-left { display: flex; flex-direction: column; gap: 1rem; }

    .concept-tag {
      display: inline-block;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 0.2rem 0.6rem;
      font-size: 0.75rem;
      font-family: monospace;
      width: fit-content;
    }

    h1 { font-size: 2.8rem; font-weight: 800; line-height: 1.1; letter-spacing: -0.03em; }
    h2 { font-size: 2rem; font-weight: 700; line-height: 1.1; }

    .description { font-size: 0.95rem; color: var(--muted); line-height: 1.65; }

    .points { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; margin-top: 0.25rem; }
    .points li { font-size: 0.88rem; padding-left: 1.2rem; position: relative; line-height: 1.5; color: var(--text); }
    .points li::before { content: "→"; position: absolute; left: 0; color: var(--accent); }

    /* Right panel */
    .slide-right { display: flex; flex-direction: column; gap: 0.85rem; min-height: 0; }

    .code-block {
      flex: 1;
      min-height: 0;
      overflow: auto;
      border-radius: 8px;
      font-size: 0.82rem;
    }
    .code-block pre { margin: 0 !important; border-radius: 8px !important; min-height: 100%; }
    .code-block code { font-size: 0.82rem !important; line-height: 1.55 !important; }

    /* Demo area */
    .demo-area { display: flex; flex-direction: column; gap: 0.6rem; flex-shrink: 0; }
    .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
      transition: background 0.15s;
    }
    button:hover { background: var(--border); }
    button.danger { border-color: var(--danger); color: var(--danger); }
    button.danger:hover { background: var(--danger-dim); }

    .log {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.6rem 0.75rem;
      font-family: monospace;
      font-size: 0.76rem;
      max-height: 110px;
      overflow-y: auto;
      min-height: 36px;
    }
    .log-entry { padding: 0.1rem 0; }
    .log-ts { color: var(--muted); margin-right: 0.4rem; }
    .log-ok   { color: var(--green); }
    .log-err  { color: var(--danger); }
    .log-warn { color: var(--yellow); }
    .log-info { color: var(--blue); }

    /* Intro extras */
    .intro-description { font-size: 1.05rem; color: var(--muted); line-height: 1.7; max-width: 540px; }
    .intro-chips { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-top: 0.5rem; }
    .intro-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1.25rem;
      font-size: 0.88rem;
      color: var(--muted);
    }

    /* Speaker slide */
    .speaker-card {
      display: flex;
      align-items: center;
      gap: 3.5rem;
    }

    .photo-placeholder {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 2px dashed var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: var(--muted);
      font-size: 0.75rem;
      flex-shrink: 0;
      background: var(--surface);
    }

    .speaker-photo {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid var(--border);
    }

    .speaker-info {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      text-align: left;
    }

    .speaker-eyebrow {
      font-size: 0.78rem;
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }

    .speaker-name {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .speaker-role  { font-size: 1rem; color: var(--muted); }
    .speaker-company { font-size: 0.9rem; color: var(--muted); }

    .speaker-divider {
      width: 40px;
      height: 2px;
      background: var(--border);
      margin: 0.5rem 0;
    }

    .speaker-bio {
      font-size: 0.92rem;
      color: var(--text);
      line-height: 1.6;
      max-width: 380px;
      font-style: italic;
    }

    .speaker-handle {
      font-size: 0.82rem;
      color: var(--muted);
      font-family: monospace;
      margin-top: 0.25rem;
    }

    .ph { opacity: 0.35; }

    .keyboard-hint {
      position: fixed;
      bottom: 1rem;
      right: 1.5rem;
      font-size: 0.72rem;
      color: var(--border);
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="logo">
      <div class="logo-dot"></div>
      Sentry — Live Demo
    </div>
    <div class="nav-controls">
      <button class="lang-btn" id="lang-en">EN</button>
      <button class="lang-btn active" id="lang-es">ES</button>
      <span class="counter" id="counter">1 / 7</span>
      <button class="nav-btn" id="prev">←</button>
      <button class="nav-btn" id="next">→</button>
    </div>
  </header>
  <div class="progress"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="slide-area" id="slide-area"></div>
  <span class="keyboard-hint">← → to navigate</span>

  <script src="https://browser.sentry-cdn.com/8.51.0/bundle.tracing.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>
</html>
